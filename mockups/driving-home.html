<!doctype html>
<html lang="zh-CN" data-theme="dark" data-mode="driving">
<head>
<meta charset="utf-8" />
<title>行车态首页 · 车机商城</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/components.css">
<style>
  body {
    background:
      radial-gradient(ellipse 1400px 900px at 50% -10%, rgba(251, 146, 60, 0.10), transparent 50%),
      var(--color-bg-0);
  }
  .driving-shell { min-height: 100vh; display: grid; grid-template-rows: 88px auto 1fr auto; }

  /* Minimal topbar in driving mode */
  .top-driving {
    height: 88px;
    display: grid; grid-template-columns: auto 1fr auto; align-items: center;
    gap: var(--space-6);
    padding: 0 var(--space-7);
    background: rgba(10, 11, 14, 0.85);
    backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid var(--color-border-subtle);
  }
  .top-driving .brand { font-size: var(--font-base); }
  .top-driving .brand-mark {
    background: linear-gradient(135deg, var(--color-driving), #EA580C);
    box-shadow: var(--glow-driving);
    color: #1A0A00;
  }

  /* Driving banner */
  .driving-strip {
    height: 88px;
    display: flex; align-items: center; gap: var(--space-5);
    padding: 0 var(--space-7);
    background: linear-gradient(90deg, rgba(251, 146, 60, 0.20), rgba(251, 146, 60, 0.04));
    border-bottom: 1px solid rgba(251, 146, 60, 0.40);
  }
  .driving-strip .icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(251, 146, 60, 0.15);
    border: 2px solid var(--color-driving);
    display: grid; place-items: center;
    color: var(--color-driving);
  }
  .driving-strip .title { color: var(--color-driving); font-weight: var(--weight-bold); font-size: var(--font-base); }
  .driving-strip .desc { color: rgba(251, 146, 60, 0.80); font-size: var(--font-sm); }
  .driving-strip .speed-display {
    margin-left: auto;
    display: flex; align-items: baseline; gap: var(--space-3);
    background: rgba(0,0,0,0.40);
    padding: var(--space-3) var(--space-5);
    border-radius: var(--radius-md);
    border: 1px solid rgba(251, 146, 60, 0.30);
  }
  .speed-num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--font-xl); font-weight: var(--weight-bold); color: #fff; letter-spacing: -0.04em; }
  .speed-unit { color: var(--color-driving); font-size: var(--font-sm); font-weight: var(--weight-semibold); }

  /* Quick buy hero grid */
  .quick-grid {
    flex: 1;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-7);
    padding: var(--space-9) var(--space-9);
    align-content: center;
  }

  .quick-card {
    background: linear-gradient(160deg, var(--color-bg-2), var(--color-bg-1));
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    display: flex; flex-direction: column; gap: var(--space-5);
    transition: all var(--duration-base) var(--ease-out);
    position: relative;
    overflow: hidden;
  }
  .quick-card::before {
    content: ""; position: absolute; inset: -2px; border-radius: var(--radius-2xl);
    background: linear-gradient(135deg, rgba(251, 146, 60, 0.30), transparent);
    z-index: -1; opacity: 0;
    transition: opacity var(--duration-base);
  }
  .quick-card:hover { transform: translateY(-6px); border-color: rgba(251, 146, 60, 0.40); }
  .quick-card:hover::before { opacity: 1; }
  .quick-card-top { display: flex; align-items: center; gap: var(--space-5); }
  .quick-card-thumb {
    width: 120px; height: 120px;
    border-radius: var(--radius-xl);
    display: grid; place-items: center;
    font-size: 72px;
    flex-shrink: 0;
  }
  .quick-card-info { flex: 1; min-width: 0; }
  .quick-card-title { font-size: var(--font-lg); font-weight: var(--weight-semibold); margin-bottom: var(--space-2); }
  .quick-card-meta { color: var(--color-text-secondary); font-size: var(--font-base); }
  .quick-card .price-hero { margin: var(--space-4) 0; }
  .quick-card .btn-driving {
    width: 100%;
    min-height: 120px;
    font-size: var(--font-xl);
    font-weight: var(--weight-bold);
    border-radius: var(--radius-xl);
    letter-spacing: 0.02em;
  }

  /* Bottom action row */
  .bottom-row {
    display: flex; gap: var(--space-5);
    padding: 0 var(--space-9) var(--space-7);
  }
  .bottom-btn {
    flex: 1;
    min-height: 96px;
    display: flex; align-items: center; justify-content: center; gap: var(--space-4);
    background: var(--color-bg-2);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    color: var(--color-text-primary);
    font-size: var(--font-base); font-weight: var(--weight-semibold);
    transition: all var(--duration-fast) var(--ease-out);
  }
  .bottom-btn:hover { background: var(--color-bg-3); }
  .bottom-btn.exit { color: var(--color-mint); border-color: rgba(94, 234, 212, 0.30); background: rgba(94, 234, 212, 0.05); }

  /* Last order toast */
  .last-order {
    position: fixed; top: 220px; right: var(--space-7);
    width: 380px;
    padding: var(--space-5);
    background: var(--color-surface-glass);
    backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(34, 197, 94, 0.30);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-glass);
    z-index: var(--z-toast);
    animation: slideInRight 0.4s var(--ease-out);
  }
  @keyframes slideInRight { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .last-order-head { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-3); }
  .last-order-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--color-success-bg); display: grid; place-items: center; color: var(--color-success); }
</style>
</head>
<body>
<div class="driving-shell">
  <!-- Minimal top bar -->
  <header class="top-driving">
    <div class="brand">
      <div class="brand-mark">J</div>
      <span>JDO Mall</span>
    </div>
    <div></div>
    <div style="display:flex;gap:var(--space-4);align-items:center">
      <div class="mode-badge driving"><span class="dot"></span>行车态 · 安全简化</div>
    </div>
  </header>

  <!-- Driving notice strip -->
  <div class="driving-strip">
    <div class="icon"><i data-lucide="alert-triangle" style="width:32px;height:32px"></i></div>
    <div>
      <div class="title">行车中 · 已切换简化购物</div>
      <div class="desc">仅显示常用商品 · 已锁定默认地址与免密支付 · 单步操作 ≤ 2 秒</div>
    </div>
    <div class="speed-display">
      <i data-lucide="gauge" style="width:28px;height:28px;color:var(--color-driving)"></i>
      <span class="speed-num">42</span>
      <span class="speed-unit">km/h</span>
    </div>
  </div>

  <!-- Last order pop -->
  <div class="last-order">
    <div class="last-order-head">
      <div class="last-order-icon"><i data-lucide="check" style="width:20px;height:20px"></i></div>
      <div style="flex:1">
        <div style="font-weight:var(--weight-semibold);font-size:var(--font-sm)">上次下单成功</div>
        <div style="color:var(--color-text-muted);font-size:14px">订单 #JD202605260847 · 已配送至默认自提点</div>
      </div>
    </div>
  </div>

  <!-- Re-buy quick cards (3 max) -->
  <main class="quick-grid">

    <div class="quick-card">
      <div class="quick-card-top">
        <div class="quick-card-thumb grad-blue">💧</div>
        <div class="quick-card-info">
          <div class="quick-card-title">玻璃水 -25℃</div>
          <div class="quick-card-meta">蓝月星 · 2L · 上次 2 周前</div>
        </div>
      </div>
      <div class="price price-hero">
        <span class="price-symbol">¥</span><span class="price-current">29</span>
        <span class="price-original" style="font-size:var(--font-base)">市价 39</span>
      </div>
      <button class="btn btn-driving">
        <i data-lucide="zap" style="width:32px;height:32px"></i>
        一键再买
      </button>
    </div>

    <div class="quick-card">
      <div class="quick-card-top">
        <div class="quick-card-thumb grad-cyan">🔌</div>
        <div class="quick-card-info">
          <div class="quick-card-title">车载充电器</div>
          <div class="quick-card-meta">小米 · 120W · 上次 5 天前</div>
        </div>
      </div>
      <div class="price price-hero">
        <span class="price-symbol">¥</span><span class="price-current">99</span>
      </div>
      <button class="btn btn-driving">
        <i data-lucide="zap" style="width:32px;height:32px"></i>
        一键再买
      </button>
    </div>

    <div class="quick-card">
      <div class="quick-card-top">
        <div class="quick-card-thumb grad-amber">🌸</div>
        <div class="quick-card-info">
          <div class="quick-card-title">车载固体香氛</div>
          <div class="quick-card-meta">观夜 · 海盐木质 · 上次 3 天前</div>
        </div>
      </div>
      <div class="price price-hero">
        <span class="price-symbol">¥</span><span class="price-current">49</span>
      </div>
      <button class="btn btn-driving">
        <i data-lucide="zap" style="width:32px;height:32px"></i>
        一键再买
      </button>
    </div>

  </main>

  <!-- Bottom row -->
  <div class="bottom-row">
    <button class="bottom-btn" onclick="location.href='order-detail.html'">
      <i data-lucide="package" style="width:32px;height:32px"></i>
      我的订单（待收 1）
    </button>
    <button class="bottom-btn" onclick="location.href='login.html'">
      <i data-lucide="qr-code" style="width:32px;height:32px"></i>
      扫码登录
    </button>
    <button class="bottom-btn exit" onclick="location.href='home.html'">
      <i data-lucide="parking-circle" style="width:32px;height:32px"></i>
      停车后展开完整购物
    </button>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
