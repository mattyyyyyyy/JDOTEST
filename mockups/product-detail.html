<!doctype html>
<html lang="zh-CN" data-theme="dark" data-mode="parked">
<head>
<meta charset="utf-8" />
<title>商品详情 · 车机商城</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/components.css">
<style>
  .pd-grid { display: grid; grid-template-columns: 60% 40%; gap: var(--space-7); align-items: start; }

  /* Gallery */
  .gallery {
    aspect-ratio: 4 / 3;
    border-radius: var(--radius-xl);
    overflow: hidden;
    background: linear-gradient(135deg, #155e75 0%, #0a2e36 100%);
    position: relative;
    display: grid; place-items: center;
  }
  .gallery::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .gallery-emoji { font-size: 280px; filter: drop-shadow(0 24px 64px rgba(0,0,0,0.5)); position: relative; z-index: 1; }
  .gallery-tag {
    position: absolute; top: var(--space-5); left: var(--space-5);
    z-index: 2;
  }
  .gallery-fav {
    position: absolute; top: var(--space-5); right: var(--space-5);
    width: 64px; height: 64px;
    background: rgba(0,0,0,0.40); backdrop-filter: blur(12px);
    border-radius: 50%; display: grid; place-items: center;
    border: 1px solid var(--color-border-default);
    color: var(--color-text-secondary);
  }
  .thumbs { display: flex; gap: var(--space-3); margin-top: var(--space-4); overflow-x: auto; padding-bottom: var(--space-2); }
  .thumb {
    width: 120px; height: 120px;
    border-radius: var(--radius-md);
    display: grid; place-items: center;
    font-size: 48px;
    border: 2px solid transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color var(--duration-fast);
  }
  .thumb.active { border-color: var(--color-accent); box-shadow: var(--glow-accent); }
  .thumb:hover { border-color: var(--color-border-strong); }

  /* Info side */
  .info { display: flex; flex-direction: column; gap: var(--space-5); }
  .breadcrumb { color: var(--color-text-muted); font-size: var(--font-xs); display: flex; align-items: center; gap: var(--space-2); }
  .breadcrumb a:hover { color: var(--color-text-primary); }
  .pd-title { font-family: var(--font-display); font-size: var(--font-2xl); font-weight: var(--weight-bold); line-height: 1.15; letter-spacing: -0.03em; }
  .pd-sub { color: var(--color-text-secondary); font-size: var(--font-sm); }

  .pd-price-box {
    padding: var(--space-5);
    background: linear-gradient(135deg, rgba(94, 234, 212, 0.06), rgba(6, 182, 212, 0.02));
    border: 1px solid rgba(94, 234, 212, 0.15);
    border-radius: var(--radius-lg);
  }
  .pd-price { display: flex; align-items: baseline; gap: var(--space-3); }
  .pd-price-current { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--font-3xl); font-weight: var(--weight-bold); color: var(--color-mint); letter-spacing: -0.04em; }
  .pd-price-symbol { font-size: var(--font-base); color: var(--color-mint); }
  .pd-meta-row { display: flex; gap: var(--space-5); margin-top: var(--space-3); color: var(--color-text-muted); font-size: var(--font-xs); }
  .pd-meta-row span { display: flex; align-items: center; gap: var(--space-1); }

  /* SKU */
  .sku-block { display: flex; flex-direction: column; gap: var(--space-4); }
  .sku-label { color: var(--color-text-secondary); font-size: var(--font-xs); display: flex; gap: var(--space-2); align-items: baseline; }
  .sku-label .selected { color: var(--color-text-primary); font-weight: var(--weight-medium); }
  .sku-options { display: flex; gap: var(--space-3); flex-wrap: wrap; }

  /* Stepper */
  .stepper {
    display: inline-flex; align-items: center;
    border: 1px solid var(--color-border-default); border-radius: var(--radius-md);
    background: var(--color-bg-2);
  }
  .stepper button { width: 88px; height: 88px; display: grid; place-items: center; color: var(--color-text-primary); }
  .stepper button:disabled { color: var(--color-text-disabled); }
  .stepper .num { width: 88px; height: 88px; display: grid; place-items: center; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--font-lg); font-weight: var(--weight-semibold); border-left: 1px solid var(--color-border-default); border-right: 1px solid var(--color-border-default); }

  /* Services */
  .services { display: flex; gap: var(--space-4); flex-wrap: wrap; padding: var(--space-4) 0; border-top: 1px solid var(--color-border-subtle); border-bottom: 1px solid var(--color-border-subtle); }
  .service { display: flex; align-items: center; gap: var(--space-2); color: var(--color-text-secondary); font-size: var(--font-xs); }
  .service .ic { width: 32px; height: 32px; border-radius: 50%; background: var(--color-bg-3); display: grid; place-items: center; color: var(--color-mint); }

  /* Pickup */
  .pickup-card { padding: var(--space-4); background: var(--color-bg-2); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-lg); display: flex; gap: var(--space-4); align-items: center; }
  .pickup-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(94, 234, 212, 0.10); display: grid; place-items: center; color: var(--color-mint); }
  .pickup-meta { flex: 1; }
  .pickup-name { font-weight: var(--weight-semibold); font-size: var(--font-sm); }
  .pickup-desc { color: var(--color-text-muted); font-size: var(--font-xs); margin-top: 4px; }
  .pickup-distance { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--color-mint); font-weight: var(--weight-semibold); font-size: var(--font-xs); }

  /* Sticky CTA */
  .cta-row {
    position: sticky; bottom: 0;
    margin-top: auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);
    padding-top: var(--space-4);
    background: linear-gradient(180deg, transparent, var(--color-bg-0) 30%);
  }
  .cta-row .btn { width: 100%; }
</style>
</head>
<body>
<div class="shell">
  <!-- TopBar -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">J</div>
      <span>JDO Mall</span>
    </div>
    <nav class="topbar-nav">
      <a class="nav-item" href="home.html">首页</a>
      <a class="nav-item" href="category.html">分类</a>
      <a class="nav-item" href="order-detail.html">订单</a>
      <a class="nav-item" href="profile.html">我的</a>
      <div class="topbar-search">
        <i data-lucide="search" style="width:24px;height:24px;color:var(--color-text-muted)"></i>
        <input placeholder="搜你想要的…" />
        <i data-lucide="mic" style="width:24px;height:24px;color:var(--color-mint)"></i>
      </div>
    </nav>
    <div class="topbar-actions">
      <div class="mode-badge"><span class="dot"></span>停车态</div>
      <button class="icon-btn" onclick="location.href='cart.html'">
        <i data-lucide="shopping-cart" style="width:32px;height:32px"></i>
        <span class="badge">3</span>
      </button>
      <button class="icon-btn" onclick="location.href='profile.html'">
        <i data-lucide="user" style="width:32px;height:32px"></i>
      </button>
    </div>
  </header>

  <div class="main">
    <!-- Side Rail -->
    <nav class="rail">
      <a class="rail-item" href="home.html"><i data-lucide="home" style="width:28px;height:28px"></i><span>首页</span></a>
      <a class="rail-item" href="category.html"><i data-lucide="grid-2x2" style="width:28px;height:28px"></i><span>全部分类</span></a>
      <a class="rail-item active"><i data-lucide="package-2" style="width:28px;height:28px"></i><span>商品详情</span></a>
      <a class="rail-item" href="cart.html"><i data-lucide="shopping-cart" style="width:28px;height:28px"></i><span>购物车</span></a>
      <a class="rail-item" href="driving-home.html"><i data-lucide="navigation" style="width:28px;height:28px;color:var(--color-driving)"></i><span style="color:var(--color-driving)">行车态预览</span></a>
    </nav>

    <main class="content">
      <div class="pd-grid">
        <!-- Left: Gallery -->
        <div>
          <div class="gallery">
            <span class="gallery-emoji">📹</span>
            <span class="badge badge-info gallery-tag">官方旗舰</span>
            <button class="gallery-fav"><i data-lucide="heart" style="width:24px;height:24px"></i></button>
          </div>
          <div class="thumbs">
            <div class="thumb grad-cyan active">📹</div>
            <div class="thumb grad-blue">🔍</div>
            <div class="thumb grad-amber">📦</div>
            <div class="thumb grad-rose">🎯</div>
            <div class="thumb grad-emerald">⚙️</div>
          </div>
        </div>

        <!-- Right: Info -->
        <div class="info">
          <div class="breadcrumb">
            <a href="home.html">首页</a> <i data-lucide="chevron-right" style="width:16px;height:16px"></i>
            <a href="category.html">行车记录</a> <i data-lucide="chevron-right" style="width:16px;height:16px"></i>
            <span>4K 双镜头</span>
          </div>
          <div>
            <h1 class="pd-title">海康威视 K3 旗舰行车记录仪</h1>
            <p class="pd-sub">4K 超清 · 双镜头 · 夜视增强 · 64G 内存卡随机送</p>
          </div>

          <div class="pd-price-box">
            <div class="pd-price">
              <span class="pd-price-symbol">¥</span>
              <span class="pd-price-current">349</span>
              <span class="price-original" style="font-size:var(--font-sm);margin-left:var(--space-3)">¥499</span>
              <span class="badge badge-flash" style="margin-left:auto">⚡ 限时 7 折</span>
            </div>
            <div class="pd-meta-row">
              <span><i data-lucide="trending-up" style="width:16px;height:16px"></i><span class="mono">月销 1.2k+</span></span>
              <span>⭐ 4.9（2.8k 评价）</span>
              <span><i data-lucide="truck" style="width:16px;height:16px"></i>顺丰次日达</span>
            </div>
          </div>

          <!-- SKU 颜色 -->
          <div class="sku-block">
            <div class="sku-label">颜色：<span class="selected">深空黑</span></div>
            <div class="sku-options">
              <button class="chip active">深空黑</button>
              <button class="chip">珍珠白</button>
              <button class="chip" disabled style="opacity:0.4;text-decoration:line-through">星河银</button>
            </div>
          </div>

          <!-- SKU 套餐 -->
          <div class="sku-block">
            <div class="sku-label">套餐：<span class="selected">标配 + 64G 卡</span></div>
            <div class="sku-options">
              <button class="chip">仅主机</button>
              <button class="chip active">标配 + 64G 卡</button>
              <button class="chip">豪华 + 128G 卡 (¥449)</button>
            </div>
          </div>

          <!-- 数量 -->
          <div class="sku-block">
            <div class="sku-label">数量：<span class="selected">1</span>（库存 26 件）</div>
            <div class="stepper">
              <button disabled><i data-lucide="minus" style="width:24px;height:24px"></i></button>
              <div class="num">1</div>
              <button><i data-lucide="plus" style="width:24px;height:24px"></i></button>
            </div>
          </div>

          <!-- Services -->
          <div class="services">
            <span class="service"><span class="ic"><i data-lucide="shield-check" style="width:18px;height:18px"></i></span>7 天无理由</span>
            <span class="service"><span class="ic"><i data-lucide="badge-check" style="width:18px;height:18px"></i></span>假一赔三</span>
            <span class="service"><span class="ic"><i data-lucide="zap" style="width:18px;height:18px"></i></span>闪电发货</span>
            <span class="service"><span class="ic"><i data-lucide="wrench" style="width:18px;height:18px"></i></span>免费安装</span>
          </div>

          <!-- Pickup -->
          <div class="pickup-card">
            <div class="pickup-icon"><i data-lucide="map-pin" style="width:24px;height:24px"></i></div>
            <div class="pickup-meta">
              <div class="pickup-name">中关村壹号 · JDO 自提点</div>
              <div class="pickup-desc">营业中 · 09:00 – 22:00 · <span class="pickup-distance">距您 1.4 km · 4 分钟车程</span></div>
            </div>
            <button class="btn btn-ghost" style="min-height:56px;padding:0 var(--space-4);font-size:var(--font-xs)">换一个</button>
          </div>

          <!-- CTA -->
          <div class="cta-row">
            <button class="btn btn-secondary btn-hero">
              <i data-lucide="shopping-cart" style="width:28px;height:28px"></i>
              加入购物车
            </button>
            <button class="btn btn-primary btn-hero" onclick="location.href='checkout.html'">
              <i data-lucide="zap" style="width:28px;height:28px"></i>
              立即购买
            </button>
          </div>
        </div>
      </div>

      <div style="height:var(--space-6)"></div>
    </main>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
