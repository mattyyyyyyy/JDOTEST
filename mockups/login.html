<!doctype html>
<html lang="zh-CN" data-theme="dark" data-mode="parked">
<head>
<meta charset="utf-8" />
<title>扫码登录 · 车机商城</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/components.css">
<style>
  body {
    background:
      radial-gradient(ellipse 1200px 800px at 20% 30%, rgba(6, 182, 212, 0.10), transparent 60%),
      radial-gradient(ellipse 1000px 600px at 80% 80%, rgba(59, 130, 246, 0.08), transparent 60%),
      var(--color-bg-0);
  }
  .login-shell { min-height: 100vh; display: grid; grid-template-rows: 88px 1fr; }
  .top-min {
    height: 88px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--space-7);
    background: rgba(10, 11, 14, 0.65);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--color-border-subtle);
  }
  .login-body { display: grid; place-items: center; padding: var(--space-7); }

  .login-card {
    width: 1200px; max-width: 90%;
    display: grid; grid-template-columns: 1.1fr 1fr;
    background: var(--color-surface-glass);
    backdrop-filter: blur(32px) saturate(200%);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-glass), var(--glow-accent);
    overflow: hidden;
  }

  /* Left: pitch */
  .login-pitch {
    padding: var(--space-9) var(--space-8);
    display: flex; flex-direction: column; gap: var(--space-7);
    background: linear-gradient(160deg, rgba(6, 182, 212, 0.08), transparent 60%);
    position: relative;
  }
  .login-pitch::before {
    content: "";
    position: absolute; top: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.25), transparent 70%);
    filter: blur(40px);
    pointer-events: none;
  }
  .login-pitch h1 { font-family: var(--font-display); font-size: 64px; font-weight: var(--weight-bold); line-height: 1.0; letter-spacing: -0.04em; position: relative; }
  .login-pitch h1 .accent { background: linear-gradient(135deg, var(--color-mint), var(--color-accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .login-pitch p { color: var(--color-text-secondary); font-size: var(--font-base); max-width: 420px; position: relative; }
  .login-pitch ul { display: flex; flex-direction: column; gap: var(--space-4); position: relative; }
  .login-pitch li { display: flex; gap: var(--space-3); align-items: center; color: var(--color-text-primary); font-size: var(--font-sm); }
  .login-pitch li .ic { width: 40px; height: 40px; border-radius: 50%; background: rgba(94, 234, 212, 0.10); display: grid; place-items: center; color: var(--color-mint); }

  /* Right: QR */
  .login-qr {
    padding: var(--space-9) var(--space-8);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-6);
    border-left: 1px solid var(--color-border-subtle);
  }

  .qr-frame {
    width: 440px; height: 440px;
    background: #fff;
    border-radius: var(--radius-2xl);
    padding: var(--space-5);
    position: relative;
    box-shadow: 0 0 64px rgba(6, 182, 212, 0.30);
  }
  .qr-frame::before, .qr-frame::after {
    content: "";
    position: absolute;
    width: 40px; height: 40px;
    border-color: var(--color-accent);
    border-style: solid; border-width: 4px;
  }
  .qr-frame::before { top: -8px; left: -8px; border-right: 0; border-bottom: 0; border-radius: var(--radius-md) 0 0 0; }
  .qr-frame::after { bottom: -8px; right: -8px; border-left: 0; border-top: 0; border-radius: 0 0 var(--radius-md) 0; }
  .qr-corners { position: absolute; top: -8px; right: -8px; width: 40px; height: 40px; border-color: var(--color-accent); border-style: solid; border-width: 4px; border-left: 0; border-bottom: 0; border-radius: 0 var(--radius-md) 0 0; }
  .qr-corners-bl { position: absolute; bottom: -8px; left: -8px; width: 40px; height: 40px; border-color: var(--color-accent); border-style: solid; border-width: 4px; border-right: 0; border-top: 0; border-radius: 0 0 0 var(--radius-md); }

  /* SVG-fake QR pattern */
  .qr-pattern { width: 100%; height: 100%; display: block; }

  .qr-status { display: flex; align-items: center; gap: var(--space-3); color: var(--color-mint); font-weight: var(--weight-semibold); font-size: var(--font-base); }
  .qr-status .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--color-mint); box-shadow: 0 0 16px var(--color-mint); animation: pulse 1.5s var(--ease-out) infinite; }
  .qr-tip { color: var(--color-text-secondary); font-size: var(--font-sm); text-align: center; }
  .qr-countdown { color: var(--color-text-muted); font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--font-sm); }

  .login-alt {
    margin-top: var(--space-4);
    padding-top: var(--space-5);
    border-top: 1px dashed var(--color-border-default);
    width: 100%;
    text-align: center;
    color: var(--color-text-muted);
    font-size: var(--font-xs);
  }
  .login-alt a { color: var(--color-text-secondary); text-decoration: underline; }
</style>
</head>
<body>
<div class="login-shell">
  <header class="top-min">
    <div class="brand">
      <div class="brand-mark">J</div>
      <span>JDO Mall</span>
    </div>
    <div class="mode-badge"><span class="dot"></span>停车态 · 完整体验</div>
  </header>

  <div class="login-body">
    <div class="login-card noise">
      <!-- Pitch -->
      <div class="login-pitch">
        <h1>不用手机号<br/>不用密码<br/><span class="accent">扫一扫，上车了</span></h1>
        <p>车机不输任何敏感信息，所有授权在你手机上完成。和你的 JDO 账号无缝互通，购物车 / 订单 / 地址一秒同步。</p>
        <ul>
          <li><span class="ic"><i data-lucide="shield" style="width:22px;height:22px"></i></span>车机端零密码输入，规避肩窥风险</li>
          <li><span class="ic"><i data-lucide="refresh-cw" style="width:22px;height:22px"></i></span>手机已登录账号，2 秒同步到车上</li>
          <li><span class="ic"><i data-lucide="link" style="width:22px;height:22px"></i></span>关联车厂账号（如有），未来一次登录多端通</li>
        </ul>
      </div>

      <!-- QR -->
      <div class="login-qr">
        <div class="qr-frame">
          <div class="qr-corners"></div>
          <div class="qr-corners-bl"></div>
          <svg class="qr-pattern" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- Fake QR -->
            <rect width="100" height="100" fill="#fff"/>
            <!-- Corner finders -->
            <g fill="#000">
              <rect x="4" y="4" width="22" height="22"/>
              <rect x="8" y="8" width="14" height="14" fill="#fff"/>
              <rect x="11" y="11" width="8" height="8"/>
              <rect x="74" y="4" width="22" height="22"/>
              <rect x="78" y="8" width="14" height="14" fill="#fff"/>
              <rect x="81" y="11" width="8" height="8"/>
              <rect x="4" y="74" width="22" height="22"/>
              <rect x="8" y="78" width="14" height="14" fill="#fff"/>
              <rect x="11" y="81" width="8" height="8"/>
            </g>
            <!-- Random data dots -->
            <g fill="#000">
              <rect x="30" y="4" width="4" height="4"/><rect x="38" y="4" width="4" height="4"/><rect x="46" y="4" width="4" height="4"/><rect x="58" y="4" width="4" height="4"/><rect x="66" y="4" width="4" height="4"/>
              <rect x="30" y="12" width="4" height="4"/><rect x="42" y="12" width="4" height="4"/><rect x="50" y="12" width="4" height="4"/><rect x="62" y="12" width="4" height="4"/><rect x="70" y="12" width="4" height="4"/>
              <rect x="34" y="20" width="4" height="4"/><rect x="42" y="20" width="4" height="4"/><rect x="54" y="20" width="4" height="4"/><rect x="66" y="20" width="4" height="4"/>
              <rect x="4" y="30" width="4" height="4"/><rect x="12" y="30" width="4" height="4"/><rect x="20" y="30" width="4" height="4"/><rect x="30" y="30" width="4" height="4"/><rect x="42" y="30" width="4" height="4"/><rect x="54" y="30" width="4" height="4"/><rect x="62" y="30" width="4" height="4"/><rect x="74" y="30" width="4" height="4"/><rect x="86" y="30" width="4" height="4"/>
              <rect x="8" y="38" width="4" height="4"/><rect x="20" y="38" width="4" height="4"/><rect x="34" y="38" width="4" height="4"/><rect x="46" y="38" width="4" height="4"/><rect x="58" y="38" width="4" height="4"/><rect x="70" y="38" width="4" height="4"/><rect x="82" y="38" width="4" height="4"/>
              <rect x="4" y="46" width="4" height="4"/><rect x="16" y="46" width="4" height="4"/><rect x="30" y="46" width="4" height="4"/><rect x="42" y="46" width="4" height="4"/><rect x="50" y="46" width="4" height="4"/><rect x="62" y="46" width="4" height="4"/><rect x="74" y="46" width="4" height="4"/><rect x="90" y="46" width="4" height="4"/>
              <rect x="12" y="54" width="4" height="4"/><rect x="24" y="54" width="4" height="4"/><rect x="38" y="54" width="4" height="4"/><rect x="50" y="54" width="4" height="4"/><rect x="62" y="54" width="4" height="4"/><rect x="78" y="54" width="4" height="4"/><rect x="86" y="54" width="4" height="4"/>
              <rect x="4" y="62" width="4" height="4"/><rect x="20" y="62" width="4" height="4"/><rect x="34" y="62" width="4" height="4"/><rect x="46" y="62" width="4" height="4"/><rect x="58" y="62" width="4" height="4"/><rect x="74" y="62" width="4" height="4"/><rect x="82" y="62" width="4" height="4"/><rect x="90" y="62" width="4" height="4"/>
              <rect x="8" y="70" width="4" height="4"/><rect x="30" y="70" width="4" height="4"/><rect x="42" y="70" width="4" height="4"/><rect x="54" y="70" width="4" height="4"/><rect x="66" y="70" width="4" height="4"/>
              <rect x="30" y="78" width="4" height="4"/><rect x="38" y="78" width="4" height="4"/><rect x="46" y="78" width="4" height="4"/><rect x="58" y="78" width="4" height="4"/><rect x="66" y="78" width="4" height="4"/><rect x="74" y="78" width="4" height="4"/><rect x="86" y="78" width="4" height="4"/>
              <rect x="34" y="86" width="4" height="4"/><rect x="42" y="86" width="4" height="4"/><rect x="50" y="86" width="4" height="4"/><rect x="62" y="86" width="4" height="4"/><rect x="74" y="86" width="4" height="4"/><rect x="82" y="86" width="4" height="4"/>
              <rect x="30" y="94" width="4" height="4"/><rect x="42" y="94" width="4" height="4"/><rect x="54" y="94" width="4" height="4"/><rect x="62" y="94" width="4" height="4"/><rect x="78" y="94" width="4" height="4"/>
            </g>
            <!-- Brand logo overlay center -->
            <rect x="40" y="40" width="20" height="20" rx="4" fill="#fff" stroke="#0A0B0E" stroke-width="1"/>
            <text x="50" y="55" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#06b6d4">J</text>
          </svg>
        </div>

        <div class="qr-status">
          <span class="dot"></span> 等待手机扫码 · <span class="qr-countdown">04:47</span>
        </div>
        <div class="qr-tip">
          请用手机 JDO App 或微信 / 支付宝扫码<br/>
          扫描后在手机上确认即可
        </div>

        <div class="login-alt">
          停车态下可改用 <a href="#">手机号 + 验证码登录</a>　·　Demo 可走 <a href="home.html">一键 mock 登录</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
